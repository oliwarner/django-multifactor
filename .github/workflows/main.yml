name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Python 3.10 / Django 5.2
            python-version: "3.10"
            tox-env: py310-django52

          - name: Python 3.11 / Django 5.2
            python-version: "3.11"
            tox-env: py311-django52

          - name: Python 3.12 / Django 5.2
            python-version: "3.12"
            tox-env: py312-django52

          - name: Python 3.12 / Django 6.0
            python-version: "3.12"
            tox-env: py312-django60

          - name: Python 3.13 / Django 5.2
            python-version: "3.13"
            tox-env: py313-django52

          - name: Python 3.13 / Django 6.0
            python-version: "3.13"
            tox-env: py313-django60

          - name: Python 3.14 / Django 5.2
            python-version: "3.14"
            tox-env: py314-django52

          - name: Python 3.14 / Django 6.0
            python-version: "3.14"
            tox-env: py314-django60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          python -m pip install tox

      - name: Run tox target
        run: tox -e ${{ matrix.tox-env }}

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-${{ matrix.tox-env }}
          path: .coverage.*
          include-hidden-files: true
          if-no-files-found: error

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install coverage
        run: |
          python -m pip install --upgrade pip
          python -m pip install coverage[toml]

      - name: Download data
        uses: actions/download-artifact@v4
        with:
          path: ${{ github.workspace }}
          pattern: coverage-data-*
          merge-multiple: true

      - name: Combine coverage and report
        run: |
          python -m coverage combine
          python -m coverage html --skip-covered --skip-empty
          python -m coverage report --fail-under=80
          echo "## Coverage summary" >> $GITHUB_STEP_SUMMARY
          python -m coverage report --format=markdown >> $GITHUB_STEP_SUMMARY

      - name: Upload HTML report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: html-report
          path: htmlcov