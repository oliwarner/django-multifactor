[tox]
envlist =
    py310-django52,
    py311-django52,
    py312-django52,
    py312-django60,
    py313-django52,
    py313-django60,
    py314-django52,
    py314-django60,
    py315-django52,
    py315-django60
isolated_build = true
skip_missing_interpreters = true
requires = coverage

[pytest]
django_find_project = false

[testenv]
deps =
    pytest
    pytest-cov
    pytest-django
    django-decorator-include
    django_extensions
    django-debug-toolbar
    django52: Django>=5.2,<5.3
    django60: Django>=6.0,<6.1

setenv =
    DJANGO_SETTINGS_MODULE = testsite.testsite.settings
    PYTHONPATH = {toxinidir}
commands =
    python -m pytest --cov=multifactor --cov-report=term-missing --cov-report=xml

[testenv:py310-django60]
skip_install = true
commands = python -c "raise SystemExit('Django 6.0 is not supported on Python 3.10')"

[testenv:py311-django60]
skip_install = true
commands = python -c "raise SystemExit('Django 6.0 is not supported on Python 3.11')"